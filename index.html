<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FixDesk - IT Troubleshooting</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  margin: 0;
}

.container {
  max-width: 1000px;
  margin: 60px auto;
  padding: 20px;
}

h1 {
  font-size: 42px;
  text-align: center;
}

.subtitle {
  text-align: center;
  color: #94a3b8;
  margin-bottom: 40px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.3s;
  border: 1px solid transparent;
}

.card:hover {
  transform: translateY(-5px);
  border: 1px solid #38bdf8;
}

.card.active {
  border: 1px solid #22c55e;
}

.result {
  margin-top: 30px;
  background: #020617;
  padding: 20px;
  border-radius: 16px;
  line-height: 1.7;
}

.buttons {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.generate {
  background: #22c55e;
  color: white;
}

.copy {
  background: #38bdf8;
  color: black;
}

.footer {
  text-align: center;
  margin-top: 40px;
  color: #64748b;
}
</style>
</head>
<body>

<div class="container">
  <h1>⚡ FixDesk</h1>
  <div class="subtitle">Instant IT troubleshooting for real-world problems</div>

  <div class="grid" id="grid"></div>

  <div class="result" id="result">Select a problem to generate solution...</div>

  <div class="buttons">
    <button class="generate" onclick="generate()">Generate Solution</button>
    <button class="copy" onclick="copyText()">Copy for Ticket</button>
  </div>

  <div class="footer">Built by viktorhristev.com 🚀</div>
</div>

<script>
const problems = {
  "🐢 Slow PC": [
    "Check CPU usage (Task Manager)",
    "Check RAM usage",
    "Disable startup apps",
    "Scan for malware",
    "Clean temp files",
    "Restart PC"
  ],
  "🌐 No Internet": [
    "Check cable connection",
    "Restart router",
    "Flush DNS",
    "Check IP config",
    "Test another device"
  ],
  "🖨 Printer Issues": [
    "Check power",
    "Check connection",
    "Restart spooler",
    "Reinstall drivers",
    "Check paper"
  ],
  "🔐 VPN Not Working": [
    "Check internet",
    "Verify credentials",
    "Restart VPN client",
    "Change server",
    "Check firewall"
  ],
  "📧 Outlook Issues": [
    "Restart Outlook",
    "Disable add-ins",
    "Repair profile",
    "Check server",
    "Re-login"
  ],
  "📡 WiFi Drops": [
    "Restart router",
    "Reconnect network",
    "Update drivers",
    "Move closer",
    "Check interference"
  ],
  "💻 Blue Screen": [
    "Note error code",
    "Update drivers",
    "Run Windows Update",
    "Check RAM",
    "Scan malware"
  ],
  "🔑 Login Issues": [
    "Check credentials",
    "Reset password",
    "Check Caps Lock",
    "Restart device",
    "Contact admin"
  ],
  "🔌 USB Not Working": [
    "Try another port",
    "Restart PC",
    "Update drivers",
    "Check device manager",
    "Test device"
  ],
  "🔊 No Sound": [
    "Check volume",
    "Check output device",
    "Restart audio service",
    "Update drivers",
    "Test headphones"
  ]
};

let selected = null;

const grid = document.getElementById("grid");

Object.keys(problems).forEach(name => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerText = name;

  div.onclick = () => {
    document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
    div.classList.add("active");
    selected = name;
  };

  grid.appendChild(div);
});

function generate() {
  if (!selected) return;

  const steps = problems[selected];
  let text = "Hello,\n\nPlease follow the steps below:\n\n";

  steps.forEach(s => {
    text += "✔ " + s + "\n";
  });

  text += "\nIf the issue persists, please contact IT support.\n\nBest regards,";

  document.getElementById("result").innerText = text;
}

function copyText() {
  const text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}
</script>

</body>
</html>
